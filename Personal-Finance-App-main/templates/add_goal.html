{% extends "base.html" %}

{% block title %}Add Goal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="clean-card">
            <h2 class="mb-4">Add Goal</h2>
            <form method="POST" action="{{ url_for('add_goal') }}">
                <div class="form-group">
                    <label for="goal">Goal Name</label>
                    <input type="text" class="form-control" name="goal" id="goal" required>
                </div>
                <div class="form-group">
                    <label for="target_amount">Target Amount</label>
                    <input type="number" step="0.01" class="form-control" name="target_amount" id="target_amount" required>
                </div>
                <div class="form-group">
                    <label for="current_amount">Current Amount</label>
                    <input type="number" step="0.01" class="form-control" name="current_amount" id="current_amount" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill mt-3">Add Goal</button>
                    <a href="{{ url_for('view_goals') }}" class="btn btn-secondary flex-fill mt-3" style="border: 1px solid var(--border-color); background: var(--surface); color: var(--text-main);">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
