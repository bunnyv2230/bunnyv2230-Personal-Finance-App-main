{% extends "base.html" %}

{% block title %}Edit Goal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="clean-card">
            <h2 class="mb-4">Edit Goal</h2>
            <form method="POST" action="{{ url_for('edit_goal', goal_id=goal.id) }}">
                <div class="form-group">
                    <label for="goal">Goal Name</label>
                    <input type="text" class="form-control" name="goal" id="goal" value="{{ goal.goal }}" placeholder="e.g. Save for Laptop" required>
                </div>
                <div class="form-group">
                    <label for="target_amount">Target Amount</label>
                    <input type="number" step="0.01" class="form-control" name="target_amount" id="target_amount" value="{{ goal.target_amount }}" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="current_amount">Current Amount</label>
                    <input type="number" step="0.01" class="form-control" name="current_amount" id="current_amount" value="{{ goal.current_amount }}" placeholder="0.00" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill mt-3">Update Goal</button>
                    <a href="{{ url_for('view_goals') }}" class="btn btn-secondary flex-fill mt-3" style="border: 1px solid var(--border-color); background: var(--surface); color: var(--text-main);">Cancel</a>
                </div>
            </form>
            <hr class="my-4">
            <div class="text-center">
                <a href="{{ url_for('delete_goal_route', goal_id=goal.id) }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Are you sure you want to completely delete this goal?');">
                    <i class="fa-solid fa-trash mr-1"></i> Delete Goal Permanently
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
