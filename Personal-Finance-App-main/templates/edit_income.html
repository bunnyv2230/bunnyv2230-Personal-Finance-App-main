{% extends "base.html" %}

{% block title %}Edit Income{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="clean-card">
            <h2 class="mb-4">Edit Income</h2>
            <form method="POST" action="{{ url_for('edit_income', income_id=income.id) }}">
                <div class="form-group">
                    <label for="source">Source</label>
                    <input type="text" class="form-control" name="source" id="source" value="{{ income.source }}" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" step="0.01" class="form-control" name="amount" id="amount" value="{{ income.amount }}" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" name="date" id="date" value="{{ income.date }}" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill mt-3">Update Income</button>
                    <a href="{{ url_for('view_income') }}" class="btn btn-secondary flex-fill mt-3" style="border: 1px solid var(--border-color); background: var(--surface); color: var(--text-main);">Cancel</a>
                </div>
            </form>
            <hr class="my-4">
            <div class="text-center">
                <a href="{{ url_for('delete_income_route', income_id=income.id) }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Are you sure you want to completely delete this income record?');">
                    <i class="fa-solid fa-trash mr-1"></i> Delete Income Permanently
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
