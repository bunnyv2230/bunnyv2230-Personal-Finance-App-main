{% extends "base.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="clean-card">
            <h2 class="mb-4">Add Expense</h2>
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" class="form-control" name="category" id="category" placeholder="e.g. Groceries" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" step="0.01" class="form-control" name="amount" id="amount" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" name="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <input type="text" class="form-control" name="description" id="description" placeholder="Brief details about the expense">
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Add Expense</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
