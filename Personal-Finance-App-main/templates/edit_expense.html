{% extends "base.html" %}

{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="clean-card">
            <h2 class="mb-4">Edit Expense</h2>
            <form method="POST" action="{{ url_for('edit_expense', expense_id=expense.id) }}">
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" class="form-control" name="category" id="category" value="{{ expense.category }}" placeholder="e.g. Groceries" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" step="0.01" class="form-control" name="amount" id="amount" value="{{ expense.amount }}" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-control" name="date" id="date" value="{{ expense.date }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <input type="text" class="form-control" name="description" id="description" value="{{ expense.description if expense.description else '' }}" placeholder="Brief details about the expense">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill mt-3">Update Expense</button>
                    <a href="{{ url_for('view_expenses') }}" class="btn btn-secondary flex-fill mt-3">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
