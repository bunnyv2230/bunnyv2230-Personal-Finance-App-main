{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
    /* Override navbar to be fully transparent on login page */
    .navbar {
        background-color: transparent !important;
        border-bottom: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
    }

    body {
        background: url('{{ url_for('static', filename='icons/login_background.png') }}') no-repeat center center;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        color: white;
        overflow: hidden;
    }

    .card {
        background: rgba(28, 28, 26, 0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), border-color 0.4s ease;
    }

    .card:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 12px 40px rgba(255, 255, 255, 0.15);
    }

    .card:focus-within {
        transform: translateY(-4px);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.25), 0 12px 40px rgba(255, 255, 255, 0.15);
    }

    .card-body {
        padding: 35px 30px;
    }

    .btn-primary {
        background-color: #ffffff;
        color: #1C1C1A !important;
        border: none;
        font-weight: 600;
        font-family: 'Audiowide', sans-serif;
        padding: 10px 20px;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    .btn-outline-secondary {
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
        font-family: 'Audiowide', sans-serif;
        padding: 10px 20px;
        transition: all 0.3s ease;
    }

    .btn-outline-secondary:hover {
        background-color: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.8);
        color: white;
    }

    .form-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.75) !important;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 8px;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white !important;
        border-radius: 8px;
        padding: 12px 16px;
        height: auto;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.5);
        color: white !important;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="text-center mb-4" style="color: #ffffff; font-family: 'Audiowide', sans-serif;">Login</h2>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
